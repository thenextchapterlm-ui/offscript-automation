name: OFFscript notifications

on:
  schedule:
    # Every 5 minutes. GitHub's scheduler can run a few minutes late under load.
    - cron: '*/5 * * * *'
  workflow_dispatch:   # lets you run it manually from the Actions tab to test

# Prevents overlapping runs if one is slow
concurrency:
  group: offscript-notify
  cancel-in-progress: false

jobs:
  notify:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install deps
        run: npm ci --omit=dev || npm install --omit=dev
      - name: Send due notifications
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: node notify.js
