name: OFFscript lead scraper

on:
  schedule:
    - cron: '*/10 * * * *'   # check for a queued scrape every 10 minutes
  workflow_dispatch:

concurrency:
  group: offscript-scraper
  cancel-in-progress: false

jobs:
  scraper:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install deps
        run: npm ci --omit=dev || npm install --omit=dev
      - name: Run lead scraper
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: node scraper.js
