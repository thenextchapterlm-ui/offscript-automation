name: OFFscript call availability sync

on:
  schedule:
    - cron: '*/30 * * * *'   # re-read calendars every 30 min
  workflow_dispatch:

concurrency:
  group: offscript-availability
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install deps
        run: npm ci --omit=dev || npm install --omit=dev
      - name: Sync calendar availability to Firestore
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          ICS_LUCA:   ${{ secrets.ICS_LUCA }}
          ICS_MILES:  ${{ secrets.ICS_MILES }}
          ICS_TANNAH: ${{ secrets.ICS_TANNAH }}
        run: node availability-sync.js
